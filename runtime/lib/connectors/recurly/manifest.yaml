key: recurly
name: Recurly
kinds: [token]
# Script connector: Recurly v3 returns pagination state as `has_more` + `next` (a relative path
# like `/accounts?cursor=abc&limit=200`) inside the JSON response body — not in an HTTP Link header
# and not as an opaque cursor token to re-send as a query param. Force-code triggers (a) field
# pre-selection (account/subscription objects are large) and (d) non-standard pagination fired.
connector_module: lib.connectors.recurly
env_var: RC_CONN_RECURLY
egress_hosts:
  - v3.recurly.com
  - v3.eu.recurly.com     # EU region; omit if not used but cheap to allow
# --- Generic lib.api caller fields (the compact declarative row) ---
base_url: https://v3.recurly.com
auth:
  strategy: basic         # API key sent as HTTP Basic username; password is empty (key + ":")
pagination:
  # Pagination is handled by the script: `has_more` (bool) + `next` (relative path) in the
  # response body. Set style=none so a naive manifest-only caller gets at least page 1 correctly.
  style: none
  items_field: data       # items live under `data` in the list envelope
  page_size: 200          # Recurly max page size
default_headers:
  Accept: application/vnd.recurly.v2021-02-25   # required — pins the stable GA API version
rate_limit:
  remaining_header: X-RateLimit-Remaining       # advisory; Recurly also sends 429 + Retry-After
help_md: |
  Reads Recurly subscription billing data for support diagnosis: accounts, subscriptions,
  invoices, transactions, and add-ons. Read-only; only ever issues GETs. Auth is a Recurly
  private API key (Admin → API Credentials → Private API Key) passed as HTTP Basic username
  with an empty password — the connector handles the encoding automatically via RC_CONN_RECURLY.

  Use the connector CLI for a joined account summary (subscription status + latest invoice +
  recent transactions in one compact markdown block):

      python -m lib.connectors.recurly account <account-code-or-id>

  Or drive individual endpoints directly via lib.api (single-page, no auto-paging):

      python -m lib.api get recurly /accounts --query limit=20
      python -m lib.api get recurly /accounts/<code>
      python -m lib.api get recurly /accounts/<code>/subscriptions
      python -m lib.api get recurly /accounts/<code>/invoices
      python -m lib.api get recurly /accounts/<code>/transactions

  Pagination: Recurly returns `has_more` + `next` (relative path) in the response body. The
  generic --paginate flag does not work for this integration; use the connector CLI for
  paginated collection.

  Common paths: /accounts, /subscriptions, /invoices, /transactions, /plans, /coupons,
  /add_ons. Filter by account: /accounts/{code}/subscriptions, /accounts/{code}/invoices.
