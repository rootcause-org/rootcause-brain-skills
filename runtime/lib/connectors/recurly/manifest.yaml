key: recurly
name: Recurly
kinds: [token]
# Manifest-only integration driven via `python -m lib.api get recurly <path>`. Recurly v3 list
# endpoints embed the next-page URL at body `next` — a RELATIVE path like
# `/accounts?cursor=abc&limit=200` (null when exhausted), not an HTTP Link header and not an opaque
# cursor token. lib.api's `body_url` style follows it via `_send_url`, which `_join`s a relative
# path onto base_url (base_url has no path segment, so `/accounts?…` -> `https://v3.recurly.com/accounts?…`,
# host preserved). No per-key Python is needed.
connector_module: ""
env_var: RC_CONN_RECURLY
credential_exposure: broker
egress_hosts:
  - v3.recurly.com
  - v3.eu.recurly.com     # EU region; omit if not used but cheap to allow
# --- Generic lib.api caller fields (the compact declarative row) ---
base_url: https://v3.recurly.com
auth:
  strategy: basic         # API key sent as HTTP Basic username; password is empty (key + ":")
pagination:
  # Recurly envelope: { "has_more": bool, "next": "<relative path|null>", "data": [...] }.
  # body_url follows `next` (a relative path, _joined onto base_url) until it is null.
  style: body_url
  next_url_field: next
  items_field: data       # items live under `data` in the list envelope
  page_size: 200          # Recurly max page size
default_headers:
  Accept: application/vnd.recurly.v2021-02-25   # required — pins the stable GA API version
rate_limit:
  remaining_header: X-RateLimit-Remaining       # advisory; Recurly also sends 429 + Retry-After
read_endpoints:
  post:
    # Preview endpoints return calculated billing outcomes without persisting a purchase/change.
    - /purchases/preview
    - /accounts/*/invoices/preview
    - /subscriptions/*/change/preview
    - /gift_cards/preview
    - /sites/*/purchases/preview
    - /sites/*/subscriptions/*/change/preview
help_md: |
  Reads Recurly subscription billing data for support diagnosis: accounts, subscriptions,
  invoices, transactions, and add-ons. Read-only; only ever issues GETs. Auth is a Recurly
  private API key (Admin → API Credentials → Private API Key) passed as HTTP Basic username
  with an empty password — lib.api handles the encoding automatically from RC_CONN_RECURLY.

  **Read + auto-paginate via lib.api** (stitches all pages by following the body `next` path):

      python -m lib.api get recurly /accounts --paginate --query limit=200
      python -m lib.api get recurly /accounts/<code>/subscriptions --paginate \
        --pick id,state,plan.code,unit_amount,currency,current_period_ends_at
      python -m lib.api get recurly /accounts/<code>/invoices --paginate
      python -m lib.api get recurly /accounts/<code>/transactions --paginate

  Drop `--paginate` for a single-page (or single-item) read, e.g. `/accounts/<code>`.

  Pagination: Recurly returns `has_more` + `next` (a relative path) in the response body; lib.api's
  body_url style follows `next` (joined onto base_url) until it is null.

  Common paths: /accounts, /subscriptions, /invoices, /transactions, /plans, /coupons,
  /add_ons. Filter by account: /accounts/{code}/subscriptions, /accounts/{code}/invoices.

  Preview POSTs are allowlisted as non-mutating single-page calls:

      python -m lib.api post recurly /purchases/preview \
        --json '{"currency":"USD","account":{"code":"acct_123"},"subscriptions":[{"plan_code":"basic"}]}' \
        --pick charge_invoice.total,charge_invoice.currency
