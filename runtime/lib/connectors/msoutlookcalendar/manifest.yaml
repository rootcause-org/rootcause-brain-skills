key: msoutlookcalendar
name: Microsoft Outlook Calendar
kinds: [token, oauth]
# Script connector: Microsoft Graph paginates with @odata.nextLink in the JSON body (an absolute
# URL), which is neither RFC 8288 Link headers (lib.api `link` style) nor a plain cursor token
# (lib.api `cursor` style sends the value as a query param). Force-code trigger (d) fires.
connector_module: lib.connectors.msoutlookcalendar
env_var: RC_CONN_MSOUTLOOKCALENDAR
egress_hosts:
  - graph.microsoft.com
  - login.microsoftonline.com    # OAuth token refresh only
# --- Generic lib.api caller fields (the compact declarative row) ---
base_url: https://graph.microsoft.com/v1.0
auth:
  strategy: bearer        # Bearer token from RC_CONN_MSOUTLOOKCALENDAR (delegated or app-only)
# Pagination is handled in the connector script (OData @odata.nextLink in body = absolute next URL).
# The manifest row below is set to `none` so lib.api does not attempt its own paging loop.
pagination:
  style: none
rate_limit:
  remaining_header: ""    # Graph uses 429 + Retry-After (honoured by lib.api); no remaining header
oauth:
  auth_url: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
  token_url: https://login.microsoftonline.com/common/oauth2/v2.0/token
  default_scopes:
    - Calendars.ReadBasic    # minimal: read calendar names + free/busy only
    - offline_access         # required to get a refresh token for long-lived access
help_md: |
  Reads Microsoft Outlook Calendar (via Microsoft Graph v1.0): calendars list, events (with
  subject, time, organizer, attendees, location), calendar view (expanded recurring events over a
  date range), and free/busy schedules. Read-only — only ever issues GETs and a POST for the
  getSchedule endpoint (free/busy query, no writes).

  Credential: a bearer token from RC_CONN_MSOUTLOOKCALENDAR — either a delegated OAuth2 token
  (Calendars.ReadBasic or Calendars.Read scope) or an application token (admin-consented).

  The connector handles Graph's OData pagination (@odata.nextLink in the JSON body is an absolute
  URL; the generic lib.api cursor/link styles can't express this pattern directly).

  **Connector CLI** (preferred — handles pagination + field pre-selection):

      # List the current user's calendars
      python -m lib.connectors.msoutlookcalendar calendars

      # List upcoming events from the primary calendar
      python -m lib.connectors.msoutlookcalendar events --top 20

      # Calendar view (expanded recurring events) for a date range
      python -m lib.connectors.msoutlookcalendar calview \
        --start 2026-06-01T00:00:00Z --end 2026-06-30T23:59:59Z

      # Events for a specific user (application token)
      python -m lib.connectors.msoutlookcalendar events --user someone@example.com

  **Generic lib.api single-page reads** (for one-off lookups, no auto-pagination):

      python -m lib.api get msoutlookcalendar me/calendars \
        --pick id,name,isDefaultCalendar,owner.address

      python -m lib.api get msoutlookcalendar me/events \
        --query '$select=subject,start,end,organizer,location,isAllDay' \
        --query '$top=10'
