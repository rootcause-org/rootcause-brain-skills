key: msoutlookcalendar
name: Microsoft Outlook Calendar
kinds: [token, oauth]
# Manifest-only integration, driven via `python -m lib.api get msoutlookcalendar`. Microsoft Graph
# paginates with @odata.nextLink: an absolute next-page URL in the JSON body. lib.api's `body_url`
# style follows it directly — next_url_field tries the whole field as a literal dict key first, so
# the dotted-but-not-nested "@odata.nextLink" resolves; the URL is absolute and used verbatim.
connector_module: ""
env_var: RC_CONN_MSOUTLOOKCALENDAR
egress_hosts:
  - graph.microsoft.com
  - login.microsoftonline.com    # OAuth token refresh only
# --- Generic lib.api caller fields (the compact declarative row) ---
base_url: https://graph.microsoft.com/v1.0
auth:
  strategy: bearer        # Bearer token from RC_CONN_MSOUTLOOKCALENDAR (delegated or app-only)
pagination:
  style: body_url
  next_url_field: "@odata.nextLink"  # literal key (dots are NOT path segments); absolute URL in body
  items_field: value                 # all Graph collection endpoints put items under "value"
  page_size: 200                     # Graph default page cap for calendar/event collections
rate_limit:
  remaining_header: ""    # Graph uses 429 + Retry-After (honoured by lib.api); no remaining header
read_endpoints:
  post:
    # getSchedule is a non-mutating free/busy query with schedules/time range in the body.
    - /me/calendar/getSchedule
    - /users/*/calendar/getSchedule
    - /v1.0/me/calendar/getSchedule
    - /v1.0/users/*/calendar/getSchedule
oauth:
  auth_url: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
  token_url: https://login.microsoftonline.com/common/oauth2/v2.0/token
  default_scopes:
    - Calendars.ReadBasic    # minimal: read calendar names + free/busy only
    - offline_access         # required to get a refresh token for long-lived access
help_md: |
  Reads Microsoft Outlook Calendar (via Microsoft Graph v1.0): calendars list and events (with
  subject, time, organizer, attendees, location). Read-only — only ever issues GETs.

  Credential: a bearer token from RC_CONN_MSOUTLOOKCALENDAR — either a delegated OAuth2 token
  (Calendars.ReadBasic or Calendars.Read scope) or an application token (admin-consented).

  Graph paginates with @odata.nextLink (an absolute next-page URL in the JSON body); `--paginate`
  follows it automatically and collects items from the "value" array across all pages.

      # List the current user's calendars (paginated)
      python -m lib.api get msoutlookcalendar me/calendars --paginate \
        --pick id,name,isDefaultCalendar,owner.address

      # List events from the primary calendar, picking support fields
      python -m lib.api get msoutlookcalendar me/events --paginate \
        --query '$select=subject,start,end,organizer,location,isAllDay' \
        --pick subject,start.dateTime,end.dateTime,organizer.emailAddress.address

      # Calendar view (expanded recurring events) over a date range
      python -m lib.api get msoutlookcalendar me/calendarView --paginate \
        --query 'startDateTime=2026-06-01T00:00:00Z' \
        --query 'endDateTime=2026-06-30T23:59:59Z'

      # Events for a specific user (application token)
      python -m lib.api get msoutlookcalendar users/someone@example.com/events --paginate

  For one-off single-page reads, drop `--paginate`:

      python -m lib.api get msoutlookcalendar me/events \
        --query '$select=subject,start,end,organizer,location,isAllDay' \
        --query '$top=10'

  Free/busy schedule POST reads are allowlisted:

      python -m lib.api post msoutlookcalendar me/calendar/getSchedule \
        --json '{"schedules":["a@contoso.com"],"startTime":{"dateTime":"2026-07-02T09:00:00","timeZone":"UTC"},"endTime":{"dateTime":"2026-07-02T17:00:00","timeZone":"UTC"},"availabilityViewInterval":60}' \
        --pick value.*.scheduleId,value.*.availabilityView
onboarding_md: |
  Ask which meeting questions matter (when is it, who's the organizer or attendee, was it booked)
  and which calendars future lookups should check. Explore the calendars list and recent events
  without copying attendee rows; capture stable calendar IDs and names, event subjects, status, and
  the timezone. The lookup key is the organizer/attendee emailAddress.address mapping a sender to an
  event. The default Calendars.ReadBasic scope returns only names and free/busy, so event subjects
  and attendees need Calendars.Read. Creating, moving, or cancelling meetings is a write requiring a
  live action or an explicit manual step; this connector only reads.
