key: sentry
name: Sentry
kinds: [token, oauth]
credential_exposure: env
credential_exposure_reason: provider-enforced read-only credential
connector_module: lib.connectors.sentry
env_var: RC_CONN_SENTRY
egress_hosts:
  - sentry.io
  - "*.sentry.io"
# Generic lib.api caller fields. Sentry needs no bespoke connector beyond the existing issue helper —
# the manifest row + `python -m lib.api get sentry api/0/...` covers ad-hoc reads.
base_url: https://sentry.io/api/0
auth:
  strategy: bearer
pagination:
  style: link             # Sentry paginates with RFC 8288 Link: rel="next" headers
  items_field: ""
rate_limit:
  remaining_header: X-Sentry-Rate-Limit-Remaining
oauth:
  auth_url: https://sentry.io/oauth/authorize/
  token_url: https://sentry.io/oauth/token/
  default_scopes: [event:read, org:read, project:read]
help_md: |
  Reads Sentry issues/events for support diagnosis. Use a token or OAuth app with read-only scopes.
onboarding_md: |
  Ask which customer bug reports should trigger a Sentry lookup and which app or project the
  errors live in. Explore live issues and capture stable project slugs, environment names,
  release/version conventions, and the lookup keys that map a reporter's email or user ID to the
  right event — Sentry only shows a user's email or ID when the app's SDK attaches it, so confirm
  which identity fields your instrumentation actually sets. Resolving, assigning, ignoring, or
  commenting on issues and changing alert rules are writes requiring a live action or an explicit
  manual step; this connector only reads.
