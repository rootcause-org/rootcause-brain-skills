key: notion
name: Notion
kinds: [token, oauth]
# Script connector: Notion's search, data-source-query, and markdown-read endpoints use request
# shapes that lib.api's GET CLI cannot express ergonomically. The script wraps those calls with
# field pre-selection while plain GETs can still use lib.api's generic client.
# Force-code triggers fired: (3) POST transport for search/query DSL + (1) field pre-selection
# (raw page `properties` objects are enormous; the script extracts support fields).
connector_module: lib.connectors.notion
env_var: RC_CONN_NOTION
egress_hosts:
  - api.notion.com
# --- Generic lib.api caller fields (the compact declarative row) ---
# Used for GET endpoints: /v1/pages/{id}, /v1/data_sources/{id}, /v1/blocks/{id}/children.
base_url: https://api.notion.com/v1
auth:
  strategy: bearer          # integration token or OAuth access token, both as `Authorization: Bearer …`
pagination:
  style: cursor             # cursor-based: start_cursor param, next_cursor + has_more in response body
  cursor_param: start_cursor
  cursor_field: next_cursor
  has_more_field: has_more
  items_field: results      # all Notion list responses wrap items under `results`
  page_size: 100            # maximum page_size Notion allows
default_headers:
  Notion-Version: "2026-03-11"   # required by Notion; markdown API lives in this version
rate_limit:
  # Notion does not expose a remaining-count header — it returns 429 + Retry-After (seconds),
  # which lib.api already honours.
  remaining_header: ""
read_endpoints:
  post:
    # Notion search and data source query are non-mutating but POST-only filter DSLs.
    - /search
    - /data_sources/*/query
    - /v1/search
    - /v1/data_sources/*/query
oauth:
  auth_url: https://api.notion.com/v1/oauth/authorize
  token_url: https://api.notion.com/v1/oauth/token
  # Notion has no granular scope strings — users pick which pages/databases to share via the
  # page-picker UX at authorization time. Pass an empty default_scopes list.
  default_scopes: []
help_md: |
  Reads Notion pages, data sources/databases, blocks, search results, and Notion-flavored Markdown.
  Integration token or OAuth; the token needs to be shared with the pages/databases you want the
  agent to access. Prefer the script CLI for markdown reads and data source queries; use lib.api
  for simple raw GETs.

  Notion write APIs (create/update Markdown, row create/update/archive) are intentionally not exposed
  from this read-tier grounding connector. Use the action plane for state-changing workflows so the
  human review gate stays intact.

  Script CLI:
      # Find pages/databases by title keyword
      python -m lib.connectors.notion search "customer onboarding"
      python -m lib.connectors.notion search "bug report" --filter page
      python -m lib.connectors.notion search "roadmap" --filter data_source

      # List/query data source entries
      python -m lib.connectors.notion query-db <data_source_id>
      python -m lib.connectors.notion query-db <data_source_id> --page-size 50
      python -m lib.connectors.notion query-db <data_source_id> --filter-json '{"property":"Status","status":{"equals":"Open"}}'

      # Markdown page flows
      python -m lib.connectors.notion page-md <page_id>

      # Data source rows are Notion pages
      python -m lib.connectors.notion row <page_id>

  Generic lib.api CLI (GET endpoints — paths relative to base_url https://api.notion.com/v1):
      # Retrieve a single page
      python -m lib.api get notion pages/<page_id> \
        --pick id,url,created_time,last_edited_time

      # Retrieve a data source schema
      python -m lib.api get notion data_sources/<data_source_id> \
        --pick id,url,title.*.plain_text

      # Walk block children (page body)
      python -m lib.api get notion blocks/<block_id>/children \
        --paginate --pick type,id

      # Raw POST search/query (single page; use the script for auto-paged compact output)
      python -m lib.api post notion search \
        --json '{"query":"onboarding","filter":{"property":"object","value":"page"},"page_size":25}' \
        --pick results.*.id,results.*.url,results.*.object

      python -m lib.api post notion data_sources/<data_source_id>/query \
        --json '{"page_size":25,"filter":{"property":"Status","status":{"equals":"Open"}}}' \
        --pick results.*.id,results.*.url
