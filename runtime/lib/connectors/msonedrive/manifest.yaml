key: msonedrive
name: Microsoft OneDrive
kinds: [token, oauth]
# Manifest-only integration, driven via `python -m lib.api get msonedrive`. Microsoft Graph
# paginates with @odata.nextLink: an absolute next-page URL in the JSON body. lib.api's `body_url`
# style follows it directly — next_url_field tries the whole field as a literal dict key first, so
# the dotted-but-not-nested "@odata.nextLink" resolves; the URL is absolute and used verbatim.
connector_module: ""
env_var: RC_CONN_MSONEDRIVE
egress_hosts:
  - graph.microsoft.com
  - login.microsoftonline.com   # OAuth token refresh (host-side) — egress guard coverage
# --- Generic lib.api caller fields (the compact declarative row) ---
base_url: https://graph.microsoft.com/v1.0
auth:
  strategy: bearer        # OAuth delegated or app-only access token, both as Authorization: Bearer …
pagination:
  style: body_url
  next_url_field: "@odata.nextLink"  # literal key (dots are NOT path segments); absolute URL in body
  items_field: value                 # all Graph collection endpoints put items under "value"
  page_size: 200                     # Graph default max for drives/children; use $top=200 where allowed
rate_limit:
  remaining_header: ""     # Graph throttles via 429 + Retry-After; no remaining-count header
oauth:
  auth_url: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
  token_url: https://login.microsoftonline.com/common/oauth2/v2.0/token
  # Minimal read-only delegated scopes for OneDrive file grounding. Files.Read covers personal
  # OneDrive; Sites.Read.All covers SharePoint/OneDrive for Business document libraries.
  default_scopes:
    - Files.Read
    - Files.Read.All
    - Sites.Read.All
    - offline_access
help_md: |
  Reads Microsoft OneDrive and SharePoint document libraries via the Microsoft Graph API v1.0.
  Supports delegated access (user token) and app-only access (client credentials). Read-only —
  only ever issues GETs.

  Authentication: inject an OAuth access token as RC_CONN_MSONEDRIVE (obtained via the OAuth
  connect flow with scopes Files.Read Files.Read.All Sites.Read.All offline_access).

  Graph paginates with @odata.nextLink (an absolute next-page URL in the JSON body); `--paginate`
  follows it automatically and collects items from the "value" array across all pages.

  Common paths and commands:

      # User's default drive metadata (single object, no pagination)
      python -m lib.api get msonedrive me/drive \
        --pick id,driveType,quota.used,quota.total

      # List root folder children, all pages, picking support fields
      python -m lib.api get msonedrive me/drive/root/children --paginate \
        --pick name,size,lastModifiedDateTime,webUrl,file,folder

      # List children of a specific folder by ID
      python -m lib.api get msonedrive drives/{drive-id}/items/{item-id}/children --paginate \
        --pick name,size,lastModifiedDateTime,webUrl

      # Search for files by keyword (paginated)
      python -m lib.api get "msonedrive" "me/drive/root/search(q='quarterly report')" --paginate \
        --pick name,webUrl,lastModifiedDateTime

      # Recent files
      python -m lib.api get msonedrive me/drive/recent --paginate \
        --pick name,webUrl,lastModifiedDateTime

  For one-off single-page reads (e.g. metadata for one item), drop `--paginate`:

      python -m lib.api get msonedrive me/drive/items/{item-id} \
        --pick id,name,size,lastModifiedDateTime,webUrl,file,folder
