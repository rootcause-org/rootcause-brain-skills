key: paddle
name: Paddle
kinds: [token, oauth]
# Manifest-only integration, driven via `python -m lib.api get paddle ...`.
# Paddle paginates with the next-page URL embedded in the JSON body at `meta.pagination.next`
# (a full absolute URL), so lib.api's `body_url` style drives the loop: it follows that URL
# verbatim and stops when it is null. Paddle also sends `meta.pagination.has_more`, but body_url
# ignores it — Paddle sets `next: null` exactly when `has_more` is false, so stopping on a null
# `next` is correct.
connector_module: ""
env_var: RC_CONN_PADDLE
credential_exposure: broker
egress_hosts:
  - api.paddle.com
# --- Generic lib.api caller fields (the compact declarative row) ---
base_url: https://api.paddle.com
auth:
  strategy: bearer        # API key presented as `Authorization: Bearer <pdl_sdbx/live key>`
pagination:
  style: body_url                       # next-page URL lives inside the JSON body
  next_url_field: meta.pagination.next  # full absolute URL; null when exhausted
  items_field: data
  page_size: 50
rate_limit:
  # Paddle uses 429 + Retry-After (honoured by lib.api); no remaining-count header documented.
  remaining_header: ""
read_endpoints:
  post:
    # Preview endpoints calculate pricing/transactions/charges without creating or billing anything.
    - /pricing-preview
    - /transactions/preview
    - /subscriptions/*/charge/preview
oauth:
  auth_url: https://login.paddle.com/oauth2/authorize
  token_url: https://login.paddle.com/oauth2/token
  default_scopes:
    - customers.read
    - subscriptions.read
    - transactions.read
    - products.read
    - prices.read
help_md: |
  Reads Paddle customers, subscriptions, transactions, products, and prices for billing-support
  diagnosis. Token (API key) or OAuth, both read-only — only ever issues GETs.

  Pagination is automatic: each list response carries `meta.pagination.next` (a full next-page
  URL), which `--paginate` follows until it is null.

      python -m lib.api get paddle /customers --query search=alice@example.com \
        --pick id,email,status,created_at
      python -m lib.api get paddle /subscriptions --query customer_id=ctm_xyz --query status=active \
        --paginate --pick id,status,next_billed_at,items.*.price.unit_price.amount
      python -m lib.api get paddle /transactions --query customer_id=ctm_xyz --paginate \
        --pick id,status,billed_at,details.totals.total,details.totals.currency_code

  **Common paths:** /customers, /subscriptions, /transactions, /products, /prices
  **Paddle ID prefixes:** ctm_ (customer), sub_ (subscription), txn_ (transaction),
  pro_ (product), pri_ (price)

  Preview POSTs are allowlisted as non-mutating single-page calls:

      python -m lib.api post paddle /pricing-preview \
        --json '{"items":[{"price_id":"pri_123","quantity":1}],"address":{"country_code":"US","postal_code":"94105"}}' \
        --pick data.details.line_items.*.price.id,data.details.totals.total,data.currency_code
onboarding_md: |
  Ask which billing-support cases customers write about (failed renewals, subscription state,
  transaction questions, refunds) and whether the Paddle account is sandbox or live. Explore
  representative customer, subscription, and transaction shapes without retaining rows; capture how
  a sender email maps to a customer (search) and its subscriptions, the ctm_/sub_/txn_/pri_ ID
  conventions, stable price/product IDs when reusable, and the status enums that matter. A refund,
  cancellation, pause, or plan change is a write and must reference a live action or remain an
  explicit manual step.
