key: bubble
name: Bubble
kinds: [token]
credential_exposure: broker
# Script connector: the force-code trigger is TOKEN-CHEAP SWAGGER DISCOVERY, not the data reads.
# Every Bubble app exposes a different, customer-defined data model, discoverable only from an
# auto-generated /meta/swagger.json that is routinely several MB. `python -m lib.connectors.bubble
# endpoints|types` parses that in Python and prints a compact inventory instead of flooding context.
# The ordinary object reads (obj/<type>) need no code — the offset pagination below drives them via
# `python -m lib.api get bubble ...`.
connector_module: lib.connectors.bubble
env_var: RC_CONN_BUBBLE
# Bubble is per-app: egress varies by the customer's app domain (a *.bubbleapps.io subdomain or a
# custom domain). A wildcard covers any HTTPS app; the broker route narrows to the single host parsed
# from the credential before any request leaves (same rationale as woocommerce).
egress_hosts:
  - "*.bubbleapps.io"   # default Bubble-hosted app subdomains
  - "*"                  # custom app domains are arbitrary — the credential's host binds the route
# --- Generic lib.api caller fields ---
# base_url is TEMPLATED per app. The credential is stored as "<admin-token>@https://<app-domain>"
# (e.g. "abc123@https://myapp.bubbleapps.io"); the host splits it, binds the broker route to that one
# host, and rewrites this placeholder to the concrete "https://<app-domain>/api/1.1" base. The agent
# drives relative paths (obj/<type>, meta/swagger.json) — the broker joins them onto the bound base.
base_url: "https://{app_domain}/api/1.1"
auth:
  strategy: bearer      # Settings › API admin token, sent as `Authorization: Bearer <token>`
pagination:
  # Bubble's Data API is offset-cursor: `cursor` is an integer item offset advanced BY the page's
  # `count`, plus a `limit` (max 100). lib.api's `offset` style advances the offset by len(items) and
  # stops on a short/empty page — identical to advancing `cursor += count`; the response `remaining`
  # gate is redundant with the short-page stop (one extra empty fetch only when the last page is
  # exactly `limit` long). Items sit under the `response.results` envelope.
  style: offset
  offset_param: cursor
  limit_param: limit
  page_size: 100
  items_field: response.results
rate_limit:
  remaining_header: ""  # Bubble documents no remaining-count header; it 429s under load
help_md: |
  Reads your Bubble app's database — whatever data types the app exposes (customers, orders, bookings,
  todos, and so on) — so the assistant can ground its support answers in your live app data.

  Generate an admin API token in your Bubble editor under Settings › API › "Admin API Tokens" ›
  "Generate a new API token", then copy the value shown as its Private key. A paid Bubble plan is
  required — on the free plan every API call is refused with an "upgrade your subscription" message —
  and each data type you want read must have its Data API enabled on that same Settings › API page.
  Paste the token together with your app address as `<token>@https://<your-app>.bubbleapps.io` (or your
  own custom domain). If the app is not yet deployed to live, point at its test version instead:
  `<token>@https://<your-app>.bubbleapps.io/version-test`.

  Good to know: the admin token is powerful — Bubble cannot issue a read-only key, so the token can in
  principle read, write, and delete, and it bypasses the app's privacy rules. rootcause keeps it
  host-side behind the API broker and only ever issues reads (writes are refused), so grounding stays
  read-only. Two things to check if a lookup comes back empty: an app that has not been deployed to
  live serves its data only under the `/version-test` address above until you click Deploy, and field
  names appear as their display labels (often with spaces, like "Created Date") when the default
  "Use field display names for key names" setting is on.

  For the assistant (technical): every Bubble app exposes a different, customer-defined data model, so
  run discovery first — `python -m lib.connectors.bubble endpoints` and `types` parse the app's
  auto-generated /meta/swagger.json (often several megabytes) in Python and print only a compact
  inventory, so never read that raw file into context:

      python -m lib.connectors.bubble endpoints          # compact METHOD path list, grouped by type
      python -m lib.connectors.bubble endpoints obj      # only the Data API object types
      python -m lib.connectors.bubble types              # exposed data types + field names/types
      python -m lib.connectors.bubble types --full user  # one type's complete schema

  Then read objects with the generic caller (read-only grounding; GETs only):

      python -m lib.api get bubble obj/<type> --paginate --pick _id,name,created_date

  Search with Bubble `constraints` — a JSON array of {key, constraint_type, value}; constraint types
  include equals, "not equal", "text contains", "greater than", "less than", in, "not in", is_empty,
  is_not_empty, "geographic_search". The `key` is the field's exact key — with display keys on (the
  default) these are DISPLAY NAMES, often WITH SPACES (`"Created Date"`, `"Modified Date"`), so quote
  them; `_id` is always present:

      python -m lib.api get bubble obj/user --paginate \
        --query 'constraints=[{"key":"email","constraint_type":"equals","value":"a@example.com"}]' \
        --pick _id,name,"Created Date"

  Pass `--paginate` whenever you use `--pick`: a plain `get` returns the raw
  {"response":{"results":[…]}} envelope, so `--pick` (which selects from the top level) would find
  nothing — `--paginate` unwraps `response.results` and applies `--pick` per item.

  Sort with sort_field + descending=true. Pagination is offset-cursor (`cursor`+`limit`, max 100 per
  page); pass `--paginate` to collect all pages. The response envelope is
  {"response":{"results":[...],"cursor":N,"count":N,"remaining":N}}. State-changing Workflow API calls
  (`/api/1.1/wf/<name>`, POST) are out of scope here and belong on the human-confirmed action plane.
onboarding_md: |
  Ask which things in the app customers email about (accounts, orders, bookings, subscriptions) and
  how a sender email maps to a record. Run `python -m lib.connectors.bubble endpoints` and `types`
  first to capture the exposed data types and their exact field KEYS — with display keys on (the
  default) these are display names WITH SPACES (`"Created Date"`, `"Created By"`); `_id` is always
  present. Note the constraint spellings and status enums that matter, and confirm each needed data
  type has its Data API enabled in Settings › API. Confirm the app is DEPLOYED: an un-deployed app
  serves only under `/version-test`, so the credential must carry that path
  (`token@https://app.bubbleapps.io/version-test`). A paid Bubble plan is required — the free plan
  returns an "upgrade" Unauthorized for every call. Editing or creating a thing, or triggering a
  workflow, is a write and must reference a live action or remain an explicit manual step.
