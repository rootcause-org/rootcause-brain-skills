key: msoutlookmail
name: Microsoft Outlook Mail
kinds: [token, oauth]
# Manifest-only integration, driven via `python -m lib.api get msoutlookmail`. Microsoft Graph
# paginates with @odata.nextLink: an absolute next-page URL in the JSON body. lib.api's `body_url`
# style follows it directly — next_url_field tries the whole field as a literal dict key first, so
# the dotted-but-not-nested "@odata.nextLink" resolves; the URL is absolute and used verbatim.
# Trim Graph's large message objects with $select (in --query) and lib.api --pick.
connector_module: ""
env_var: RC_CONN_MSOUTLOOKMAIL
egress_hosts:
  - graph.microsoft.com
  - login.microsoftonline.com   # OAuth token refresh (host-side) — egress guard coverage
# --- Generic lib.api caller fields (the compact declarative row) ---
base_url: https://graph.microsoft.com/v1.0
auth:
  strategy: bearer        # OAuth delegated or app-only access token: Authorization: Bearer …
pagination:
  style: body_url
  next_url_field: "@odata.nextLink"  # literal key (dots are NOT path segments); absolute URL in body
  items_field: value                 # all Graph collection responses put items under "value"
  page_size: 50                      # $top=50 is a safe default for messages (bodies can be large)
rate_limit:
  remaining_header: ""    # Graph throttles via 429 + Retry-After; no remaining-count header
oauth:
  auth_url: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
  token_url: https://login.microsoftonline.com/common/oauth2/v2.0/token
  # Minimal read-only delegated scopes. Mail.ReadBasic is preferred (subject/sender/timestamps,
  # no body content — lower admin-consent bar). Upgrade to Mail.Read to access bodyPreview.
  # offline_access is required for refresh tokens.
  default_scopes:
    - Mail.ReadBasic
    - offline_access
help_md: |
  Reads Microsoft Outlook Mail (via Microsoft Graph v1.0): messages, mail folders, and message
  search. Read-only — only ever issues GETs. Supports delegated access (user OAuth token) and
  app-only access (admin-consented application token).

  Credential: inject an OAuth access token as RC_CONN_MSOUTLOOKMAIL (obtained via the OAuth
  connect flow with scopes Mail.ReadBasic offline_access; upgrade to Mail.Read for bodyPreview).
  App-only access requires Mail.ReadBasic.All or Mail.Read.All (admin consent required).

  Graph paginates with @odata.nextLink (an absolute next-page URL in the JSON body); `--paginate`
  follows it automatically and collects items from the "value" array across all pages. Use $select
  (in --query) and --pick to keep Graph's large message objects lean.

      # List recent messages, all pages, picking support fields
      python -m lib.api get msoutlookmail me/messages --paginate \
        --query '$select=id,subject,from,receivedDateTime,bodyPreview,isRead' \
        --pick id,subject,from.emailAddress.address,receivedDateTime,isRead

      # Messages for a specific user (application token)
      python -m lib.api get msoutlookmail users/someone@example.com/messages --paginate \
        --query '$select=id,subject,from,receivedDateTime,isRead'

      # Messages in a specific folder (well-known name or folder id)
      python -m lib.api get msoutlookmail me/mailFolders/inbox/messages --paginate \
        --query '$select=id,subject,from,receivedDateTime,isRead'

      # Search messages by keyword ($search uses KQL)
      python -m lib.api get msoutlookmail me/messages --paginate \
        --query '$search="invoice payment"'

      # List mail folders
      python -m lib.api get msoutlookmail me/mailFolders --paginate \
        --pick id,displayName,totalItemCount,unreadItemCount

  For one-off single-page reads, drop `--paginate`:

      python -m lib.api get msoutlookmail me/messages \
        --query '$select=id,subject,from,receivedDateTime,bodyPreview,isRead' \
        --query '$top=10'
