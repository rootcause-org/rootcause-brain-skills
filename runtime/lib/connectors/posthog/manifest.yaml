key: posthog
name: PostHog
kinds: [token, oauth]
# Manifest-only integration driven via `python -m lib.api get posthog <path>`. PostHog embeds the
# next-page URL at body `next` (a full ABSOLUTE URL, or null when exhausted) in its
# {"count": N, "next": "<url>", "previous": "…", "results": [...]} envelope — NOT an HTTP Link
# header and NOT an opaque cursor token. lib.api's `body_url` style follows `next` directly via
# `_send_url` (absolute URL used verbatim, auth re-applied), so no per-key Python is needed.
connector_module: ""
env_var: RC_CONN_POSTHOG
egress_hosts:
  - us.posthog.com
  - eu.posthog.com
# --- Generic lib.api caller fields (the compact declarative row) ---
# Default to US Cloud. EU Cloud users: pass absolute URL paths or target eu.posthog.com directly.
base_url: https://us.posthog.com
auth:
  strategy: bearer        # Personal API key or OAuth access token, both presented as Bearer
pagination:
  # PostHog envelope: {"count": N, "next": "<absolute url|null>", "previous": "…", "results": [...]}.
  # body_url follows `next` (absolute URL) until it is null; items live under `results`.
  style: body_url
  next_url_field: next
  items_field: results    # list lives under `results` in every paginated envelope
  page_size: 100          # advisory; passed as `limit` query param
rate_limit:
  # PostHog returns 429 + Retry-After (handled by lib.api). No remaining-count header documented.
  remaining_header: ""
oauth:
  auth_url: https://app.posthog.com/oauth/authorize
  token_url: https://app.posthog.com/oauth/token
  default_scopes:
    - project:read
    - person:read
    - feature_flag:read
    - session_recording:read
    - query:read
    - activity_log:read
help_md: |
  Reads PostHog analytics: persons/users, feature flags, session recordings, and raw events for
  support diagnosis ("which flags is this user enrolled in / what did they do before the error /
  does this user exist in PostHog"). Bearer auth with a Personal API Key or OAuth access token.
  Read-only — only ever issues GETs against the private cloud endpoints.

  Most paths require a numeric project_id (find it in PostHog -> Project Settings -> Project ID).

  **Read + auto-paginate via lib.api** (stitches all pages by following the body `next` URL):

      python -m lib.api get posthog api/projects/12345/persons --paginate \
        --query search=user@example.com \
        --pick id,distinct_ids,properties.email,properties.plan,created_at

      python -m lib.api get posthog api/projects/12345/feature_flags --paginate \
        --pick id,key,name,active,filters

      python -m lib.api get posthog api/projects/12345/session_recordings --paginate \
        --query person_id=<uuid> \
        --pick id,distinct_id,start_time,recording_duration,console_error_count,start_url

      python -m lib.api get posthog api/projects/12345/events --paginate \
        --query distinct_id=<id> --query limit=50 \
        --pick id,event,timestamp,distinct_id

  Drop `--paginate` for a single-page (or single-item) read.

  EU Cloud users: target eu.posthog.com directly (pass an absolute URL path).

  Common paths (for single-item GETs via python -m lib.api get posthog <path>):
  - api/projects/{project_id}/persons/{id}/         -- single person detail
  - api/organizations/                              -- list orgs (discover org IDs)
  - api/organizations/{org_id}/projects/            -- list projects to find numeric project_id
