key: honeybadger
name: Honeybadger
kinds: [token]
# Manifest-only integration, driven via `python -m lib.api get honeybadger ...`.
# Honeybadger embeds the next-page URL in the JSON body at `links.next` (a full absolute URL),
# not in an HTTP Link header. lib.api's `body_url` style follows that URL verbatim and stops when
# it is absent. Each page's items live under `results`.
connector_module: ""
env_var: RC_CONN_HONEYBADGER
egress_hosts:
  - app.honeybadger.io
# --- Generic lib.api caller fields (the compact declarative row) ---
base_url: https://app.honeybadger.io/v2
auth:
  strategy: basic           # Auth token as HTTP Basic username; password empty (cred is "token:").
                            # lib.api Base64-encodes it and sends Authorization: Basic …
pagination:
  style: body_url           # next-page URL lives inside the JSON body
  next_url_field: links.next   # full absolute URL; absent when exhausted
  items_field: results      # each page's items live under the "results" key
  page_size: 25             # Honeybadger's max and default per_page
rate_limit:
  remaining_header: X-RateLimit-Remaining   # 360 req/hr; also sends X-RateLimit-Limit + X-RateLimit-Reset
help_md: |
  Reads Honeybadger error faults, deployments, projects, uptime monitors, and comments for support
  diagnosis ("is this a known error / when was it last seen / what deployed around that time"). Uses
  read-only HTTP Basic auth: set RC_CONN_HONEYBADGER to your personal auth token (from
  app.honeybadger.io → Profile → Authentication token) — lib.api sends it as `token:` (empty
  password) encoded as Basic auth, which is Honeybadger's documented mechanism.

  Pagination is automatic: each list response carries `{"links": {"next": "<full URL>"},
  "results": […]}`, and `--paginate` follows `links.next` until it is absent.

  Rate limit: 360 requests/hour; tracked via X-RateLimit-Remaining.

  Common commands (replace PROJECT_ID with your Honeybadger project numeric ID):

      # List unresolved faults (errors) for a project, most recent first
      python -m lib.api get honeybadger projects/PROJECT_ID/faults \
        --query q=is:unresolved --query order=recent --paginate \
        --pick id,klass,message,environment,last_notice_at,notices_count,url

      # Recent deployments (correlate with error spikes)
      python -m lib.api get honeybadger projects/PROJECT_ID/deploys \
        --query environment=production --paginate \
        --pick created_at,environment,revision,local_username

      # List all projects (get project IDs and fault counts)
      python -m lib.api get honeybadger projects --paginate \
        --pick id,name,fault_count,unresolved_fault_count,last_notice_at
onboarding_md: |
  Ask what kind of customer bug report should send you looking in Honeybadger and which project its
  errors live in. Explore live faults and recent deploys, and capture stable project numeric IDs,
  environment names, and the lookup keys that map a reporter's email or user ID to their fault, plus
  the release/revision conventions that let you tie an error spike to a deploy — that user context
  only appears when the app attaches it, so confirm which identity fields your instrumentation sets.
  Resolving or ignoring faults, commenting, or pausing uptime checks are writes requiring a live
  action or an explicit manual step; this connector only reads.
