key: mollie
name: Mollie
kinds: [token, oauth]
# Script connector: Mollie v2 list responses are HAL envelopes with items under
# _embedded.<resource>, where <resource> changes per endpoint (payments, refunds,
# balances, settlements, customers, ...). A fixed manifest items_field cannot cover
# the common support surface, so the connector extracts the envelope dynamically.
connector_module: lib.connectors.mollie
env_var: RC_CONN_MOLLIE
credential_exposure: broker
egress_hosts:
  - api.mollie.com
base_url: https://api.mollie.com/v2
auth:
  strategy: bearer
pagination:
  style: body_url
  next_url_field: _links.next.href
  items_field: ""
  page_size: 250
rate_limit:
  remaining_header: ""
oauth:
  auth_url: https://my.mollie.com/oauth2/authorize
  token_url: https://api.mollie.com/oauth2/tokens
  default_scopes:
    - payments.read
    - refunds.read
    - balances.read
    - settlements.read
    - customers.read
    - profiles.read
    - organizations.read
help_md: |
  Reads Mollie payments, refunds, balances, settlements, customers, and profiles for
  payment-support diagnosis. OAuth is preferred; API keys also work. The run connector is
  read-only and only issues GETs. Refund creation belongs in a human-confirmed action.

  Best first reads:

      python -m lib.connectors.mollie list payments --query limit=50 --max-pages 2
      python -m lib.connectors.mollie payment tr_7UhSN1zuXS --embed refunds,chargebacks
      python -m lib.connectors.mollie refund-plan tr_7UhSN1zuXS --amount 12.34 --currency EUR

  Common reads:

      python -m lib.connectors.mollie list refunds --query limit=50 --query embed=payment
      python -m lib.connectors.mollie list balances
      python -m lib.connectors.mollie list settlements --query limit=25
      python -m lib.connectors.mollie get customer cst_123
      python -m lib.api get mollie /methods --query amount[value]=10.00 --query amount[currency]=EUR

  OAuth organization-level tokens may need `profileId=<pfl_...>` and may use `testmode=true` for test
  resources. API keys are usually profile-bound and should not send `profileId` or `testmode`.

  IDs: payments usually start with `tr_`, refunds with `re_`, profiles with `pfl_`, customers with
  `cst_`, balances with `bal_`, settlements with `stl_`. Use `--pick`-style compact output from this
  connector first, then raw `python -m lib.api get mollie /path` only when a rare field is missing.

  Refunds:
  - Grounding/preflight: `refund-plan` reads the payment plus existing refunds and returns compact
    evidence for whether the amount/currency/description are plausible.
  - Execution: hosted actions can declare `connections: [mollie.write]` and call
    `from lib.action import mollie; mollie.create_payment_refund(...)`. Never POST refunds from the
    standard run loop.
