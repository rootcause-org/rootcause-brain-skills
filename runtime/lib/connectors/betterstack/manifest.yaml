key: betterstack
name: Better Stack
kinds: [token]
# Manifest-only integration driven via `python -m lib.api get betterstack <path>`. Better Stack
# Uptime list endpoints embed the next-page URL at body `pagination.next` (a full ABSOLUTE URL, or
# null when exhausted) — NOT an HTTP `Link:` header and NOT an opaque cursor token. lib.api's
# `body_url` style follows it directly via `_send_url` (absolute URL used verbatim, auth re-applied),
# so no per-key Python is needed.
connector_module: ""
env_var: RC_CONN_BETTERSTACK
egress_hosts:
  - uptime.betterstack.com
# --- Generic lib.api caller fields (the compact declarative row) ---
base_url: https://uptime.betterstack.com/api/v2
auth:
  strategy: bearer        # API token presented as `Authorization: Bearer <token>`
pagination:
  # Better Stack returns { "data": [...], "pagination": { "next": "<absolute url>|null", ... } }.
  # body_url follows `pagination.next` (absolute URL) until it is null; items live under `data`.
  style: body_url
  next_url_field: pagination.next
  items_field: data       # items live under "data" in every list response
  page_size: 50           # Better Stack default page size (undocumented max; 50 is safe)
rate_limit:
  # Better Stack does not document a remaining-count header; 429 + Retry-After honoured by lib.api.
  remaining_header: ""
help_md: |
  Reads Better Stack Uptime data for support diagnosis: monitors (status, URL, check frequency),
  incidents (cause, started/resolved timestamps, affected monitor), heartbeats, and on-call
  escalation policies. Read-only — only ever issues GETs.

  Auth: Better Stack API token, generated at https://betterstack.com/team/api-tokens (scoped to
  the team you want to ground). Inject as RC_CONN_BETTERSTACK.

  **Read + auto-paginate via lib.api** (stitches all pages by following `pagination.next`):

      python -m lib.api get betterstack monitors --paginate \
        --pick data.*.id,data.*.attributes.pronounceable_name,data.*.attributes.status,data.*.attributes.url
      python -m lib.api get betterstack incidents --paginate \
        --pick data.*.attributes.name,data.*.attributes.status,data.*.attributes.started_at,data.*.attributes.resolved_at,data.*.attributes.cause
      python -m lib.api get betterstack monitors/<id>/incidents --paginate

  Drop `--paginate` for a single-page read.

  **Common paths (v2 base):**
    monitors, monitors/{id}, monitors/{monitor_id}/incidents,
    heartbeats, heartbeats/{id},
    incidents (all open), incidents/{id},
    escalation-policies, on-calls,
    status-pages, status-pages/{id}

  **Response envelope:** all list endpoints return ``{ "data": [...], "pagination": { "next": url|null, ... } }``.
  Each item follows JSON:API shape: ``{ "id": "…", "type": "…", "attributes": { … } }``.
