key: betterstack
name: Better Stack
kinds: [token]
# Script connector: Better Stack Uptime API paginates via ``pagination.next`` — a full absolute URL
# (or null) inside the JSON response body. This is NOT an HTTP ``Link:`` header (lib.api's ``link``
# style) and NOT a standalone opaque cursor token. The ``link`` style reads
# ``Link: <…>; rel="next"`` HTTP response headers; there are none here. The ``cursor`` style
# would send the full next URL as a query parameter — also wrong. Force-code trigger (d) fired:
# the connector owns the pagination loop via ``_betterstack_pages()``, delegating all HTTP concerns
# (auth, retry, rate-limit, timeouts) to ``lib.api``.
connector_module: lib.connectors.betterstack
env_var: RC_CONN_BETTERSTACK
egress_hosts:
  - uptime.betterstack.com
# --- Generic lib.api caller fields (the compact declarative row) ---
base_url: https://uptime.betterstack.com/api/v2
auth:
  strategy: bearer        # API token presented as `Authorization: Bearer <token>`
pagination:
  # Better Stack returns { "data": [...], "pagination": { "next": "<url>|null", ... } }.
  # ``pagination.next`` is a full URL (body-embedded), not an HTTP Link header. The script owns the
  # while-has-more loop; these fields document the envelope so manifest-only single-page reads work.
  style: none             # script-owned; `none` so naive manifest-only callers get the first page
  items_field: data       # items live under "data" in every list response
  page_size: 50           # Better Stack default page size (undocumented max; 50 is safe)
rate_limit:
  # Better Stack does not document a remaining-count header; 429 + Retry-After honoured by lib.api.
  remaining_header: ""
help_md: |
  Reads Better Stack Uptime data for support diagnosis: monitors (status, URL, check frequency),
  incidents (cause, started/resolved timestamps, affected monitor), heartbeats, and on-call
  escalation policies. Read-only — only ever issues GETs.

  Auth: Better Stack API token, generated at https://betterstack.com/team/api-tokens (scoped to
  the team you want to ground). Inject as RC_CONN_BETTERSTACK.

  **Connector commands (recommended — stitches pages, renders markdown):**

      # Uptime status of all monitors
      python -m lib.connectors.betterstack monitors

      # Open (unresolved) incidents across all monitors
      python -m lib.connectors.betterstack incidents

      # Incidents for a specific monitor by id
      python -m lib.connectors.betterstack incidents --monitor-id <id>

  **Direct single-page reads via lib.api (no auto-paging):**

      python -m lib.api get betterstack monitors --pick data.*.attributes.pronounceable_name,data.*.attributes.status,data.*.attributes.url
      python -m lib.api get betterstack incidents --pick data.*.attributes.name,data.*.attributes.status,data.*.attributes.started_at,data.*.attributes.resolved_at,data.*.attributes.cause

  **Common paths (v2 base):**
    monitors, monitors/{id}, monitors/{monitor_id}/incidents,
    heartbeats, heartbeats/{id},
    incidents (all open), incidents/{id},
    escalation-policies, on-calls,
    status-pages, status-pages/{id}

  **Response envelope:** all list endpoints return ``{ "data": [...], "pagination": { "next": url|null, ... } }``.
  Each item follows JSON:API shape: ``{ "id": "…", "type": "…", "attributes": { … } }``.
