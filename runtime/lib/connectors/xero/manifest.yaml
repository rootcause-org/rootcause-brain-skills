key: xero
name: Xero
kinds: [token, oauth]
credential_exposure: broker
# Script connector: Xero uses 1-based page-number pagination (`page=1,2,3…`) with a fixed 100
# items/page, stopping when a page returns fewer than 100 items. The generic lib.api offset style
# increments by item count (0 → 100 → 200…), which is incompatible. Force-code trigger (d) fired:
# non-standard pagination. The connector also handles the required per-tenant `Xero-tenant-id`
# header so callers don't need to supply it as a raw --query k=v on every call.
connector_module: lib.connectors.xero
env_var: RC_CONN_XERO
egress_hosts:
  - api.xero.com
  - identity.xero.com    # OAuth token refresh endpoint
# --- Generic lib.api caller fields (the compact declarative row) ---
base_url: https://api.xero.com/api.xro/2.0
auth:
  strategy: bearer        # OAuth2 access token, injected from the oauth row's fresh bearer
pagination:
  # Xero uses 1-based page-number paging (page=1,2,3…), a fixed 100-item ceiling, no has-more flag —
  # lib.api's `page` style. The script's _xero_pages() drives it with a per-call items_field because
  # each endpoint wraps its rows under a different key (Invoices, Contacts, …). The manifest row
  # below documents the real style but leaves items_field empty: a single key can't paginate every
  # endpoint, so generic `--paginate` collapses to one page (use the connector CLI for multi-page).
  style: page
  page_param: page
  page_start: 1
  items_field: ""          # varies per endpoint (Invoices, Contacts, etc.); the script sets it per call
  page_size: 100           # Xero's fixed maximum — cannot be overridden
rate_limit:
  remaining_header: X-MinLimit-Remaining   # advisory; Xero also sends 429 + Retry-After
oauth:
  auth_url: https://login.xero.com/identity/connect/authorize
  token_url: https://identity.xero.com/connect/token
  default_scopes:
    - openid
    - profile
    - email
    - offline_access
    - accounting.invoices.read
    - accounting.payments.read
    - accounting.banktransactions.read
    - accounting.contacts.read
    - accounting.settings.read
help_md: |
  Reads Xero accounting data for support diagnosis: invoices, contacts, credit notes, payments,
  accounts, and bank transactions. Read-only — only ever issues GETs. Auth is OAuth (recommended)
  or a long-lived token; the access token is held host-side behind the API broker.

  Every Xero request requires a `Xero-tenant-id` header (the organisation's UUID — find it via
  `/connections`). The connector CLI accepts `--tenant-id` and threads it through automatically.
  For raw lib.api calls supply it explicitly with `--query Xero-tenant-id=<uuid>` (the connector
  injects it as a header, but lib.api's --query flag is the escape hatch for direct calls).

  **Connector commands (recommended):**

      # List tenants / find tenant-id first:
      python -m lib.connectors.xero tenants

      # Get an invoice by number or UUID:
      python -m lib.connectors.xero invoice --tenant-id <uuid> INV-0042

      # List a contact's open invoices:
      python -m lib.connectors.xero contact --tenant-id <uuid> "Acme Corp"

      # List recent invoices (all statuses, newest first):
      python -m lib.connectors.xero invoices --tenant-id <uuid> --status OUTSTANDING

  **Direct API reads (single-page, for quick exploration):**

      python -m lib.api get xero /Invoices --query InvoiceNumber=INV-0042
      python -m lib.api get xero /Contacts --query where=Name%3D%3D%22Acme+Corp%22

  Note: for multi-page collection use the connector CLI; `python -m lib.api get xero ... --paginate`
  is not supported for Xero (1-based page style incompatible with the generic paginator).

  **Common paths:** /Invoices, /Contacts, /CreditNotes, /Payments, /Accounts, /BankTransactions,
  /Organisations, /Currencies
  **OAuth connect flow:** requires granular read scopes for invoices/credit notes, payments,
  bank transactions, contacts, and organisation settings, plus `offline_access` for refresh tokens.
onboarding_md: |
  Ask which invoice or payment questions customers write in about — an outstanding or missing
  invoice, a payment not applied, or a credit note. Explore contacts, invoices, and payments without
  keeping customer rows; capture how a sender email or name maps to a Xero contact and then to that
  contact's invoices, credit notes, and payments, plus the status values that mean outstanding or
  paid. Clarify which organisation (Xero-tenant-id) applies when the connection sees more than one.
  Sending or voiding an invoice, recording a payment, or creating a contact is a write requiring a
  live action or an explicit manual step; this connector only reads.
