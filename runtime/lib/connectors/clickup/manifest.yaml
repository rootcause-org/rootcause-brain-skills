key: clickup
name: ClickUp
kinds: [token, oauth]
# Manifest-only integration: NO connector_module. ClickUp task lists page with a 0-based PAGE NUMBER
# (page=0,1,2,…), expressed natively by lib.api's `page` style with page_start=0 — the paginator
# increments the page number (not an item-count offset) and stops on a short/empty page. The agent
# drives it via `python -m lib.api get clickup …`.
#
# Auth note: ClickUp personal tokens (pk_…) ride raw in the Authorization header with NO "Bearer"
# prefix — api_key_header strategy places the credential value verbatim. OAuth access tokens also
# use the same header; the host injects either as the env var value, so the strategy is consistent.
connector_module: ""
env_var: RC_CONN_CLICKUP
egress_hosts:
  - api.clickup.com
# --- Generic lib.api caller fields (the compact declarative row) ---
base_url: https://api.clickup.com/api/v2
auth:
  strategy: api_key_header   # places the credential value verbatim as Authorization: <token>
  name: Authorization        # personal token (pk_…) has no "Bearer" prefix; OAuth host-injects bearer
pagination:
  # ClickUp task-list endpoints use 0-based page numbers (page=0,1,2,…); there is no has_more field
  # or cursor — a page returning fewer than page_size items signals exhaustion. page_size=100 is the
  # server-enforced ceiling.
  style: page
  page_param: page
  page_start: 0              # ClickUp is 0-based
  items_field: tasks         # list-tasks response envelope: {"tasks": [...]}
  page_size: 100
rate_limit:
  remaining_header: X-RateLimit-Remaining
oauth:
  auth_url: https://app.clickup.com/api
  token_url: https://api.clickup.com/api/v2/oauth/token
  default_scopes: []         # ClickUp OAuth is scope-less at the token level — workspace access is
                             # governed by app permissions granted during the OAuth connect flow
help_md: |
  Reads ClickUp tasks, comments, spaces, lists, and workspace members for support diagnosis
  ("what tasks are open for this customer / what's the status / recent comments"). Personal API
  token (pk_…) or OAuth, both read-only — only ever issues GETs.

  Pagination uses 0-based page numbers (page=0,1,2,…); ClickUp caps at 100 tasks/page and stops
  when a page returns fewer items. The `--paginate` flag drives this automatically.

  Common paths (the agent supplies {team_id}/{space_id}/{list_id}/{task_id} from prior calls or
  context — start with `team` to discover workspace IDs, then drill into spaces → lists → tasks):

      # List all workspaces the token can access
      python -m lib.api get clickup team

      # Tasks in a list (paginated over all pages)
      python -m lib.api get clickup list/{list_id}/task --paginate \
        --pick tasks.*.id,tasks.*.name,tasks.*.status.status,tasks.*.assignees.*.username,tasks.*.due_date,tasks.*.url,tasks.*.list.name

      # Cross-workspace task search (paginated)
      python -m lib.api get clickup team/{team_id}/task --paginate \
        --query statuses[]=open \
        --pick tasks.*.id,tasks.*.name,tasks.*.status.status,tasks.*.url

      # Get a single task
      python -m lib.api get clickup task/{task_id} \
        --pick id,name,status.status,assignees.*.username,due_date,url,description

      # Get task comments (25 most recent, newest first by default)
      python -m lib.api get clickup task/{task_id}/comment

      # List spaces in a workspace
      python -m lib.api get clickup team/{team_id}/space --query archived=false \
        --pick spaces.*.id,spaces.*.name,spaces.*.features.due_dates.enabled
