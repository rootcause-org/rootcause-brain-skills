key: chargebee
name: Chargebee
kinds: [token, oauth]
# Manifest-only integration: NO connector_module. Basic reads (customers/subscriptions/invoices/
# transactions/events) trip no force-code trigger â€” Basic auth and cursor pagination are both
# handled natively by lib.api. The agent drives it directly via `python -m lib.api get chargebee â€¦`.
connector_module: ""
env_var: RC_CONN_CHARGEBEE
credential_exposure: broker
egress_hosts:
  - "*.chargebee.com"     # per-account subdomain: {site}.chargebee.com
# --- Generic lib.api caller fields (the compact declarative row) ---
# base_url is templated: the agent supplies the actual site subdomain via the full path or by
# setting the site in the path. Because Chargebee uses a per-account subdomain the base_url here
# uses the literal placeholder {site} â€” see help_md for how to pass it.
base_url: https://{site}.chargebee.com/api/v2
auth:
  strategy: basic         # API key as HTTP Basic username; password is empty â€” lib.api encodes "key:"
pagination:
  # Chargebee returns `next_offset` (opaque cursor) in the response body; you send it back as the
  # `offset` query param. This maps exactly to lib.api's cursor style:
  #   cursor_field  = where in the response the next token lives
  #   cursor_param  = what query param carries it on the next request
  #   has_more_field = absent â€” loop until next_offset is null/missing
  style: cursor
  cursor_field: next_offset
  cursor_param: offset
  has_more_field: ""      # absence of next_offset is the stop signal; no separate has_more field
  items_field: list       # list responses wrap items under "list": [{"customer":{â€¦}}, â€¦]
  page_size: 100          # Chargebee max; default is 10, so always pass limit=100
default_headers: {}       # no required version header for Chargebee v2
rate_limit:
  remaining_header: ""    # Chargebee does not expose a remaining-count header; 429 + Retry-After honoured
read_endpoints:
  post:
    # Estimate endpoints calculate hypothetical billing outcomes without creating Chargebee records.
    - /estimates/*
    - /customers/*/*_estimate
    - /subscriptions/*/*_estimate
    - /api/v2/estimates/*
    - /api/v2/customers/*/*_estimate
    - /api/v2/subscriptions/*/*_estimate
oauth:
  auth_url: https://chargebee.com/oauth/authorize
  token_url: https://chargebee.com/oauth/token
  default_scopes:
    - read_only           # minimal read-only scope for support grounding
help_md: |
  Reads Chargebee customers, subscriptions, invoices, transactions, and events for billing-support
  diagnosis. Read-only â€” only ever issues GETs. Auth is a Chargebee Full-Access or Read-Only API
  key (Settings â†’ Configure Chargebee â†’ API Keys), passed via RC_CONN_CHARGEBEE as HTTP Basic
  username with an empty password â€” the connector encodes it automatically.

  IMPORTANT â€” per-account subdomain: Chargebee's base URL is `https://{site}.chargebee.com/api/v2`.
  Because the site name varies per customer, supply the full absolute URL when calling:

      python -m lib.api get chargebee https://YOURSITE.chargebee.com/api/v2/customers \
        --query limit=100 --paginate \
        --pick "customer.id,customer.email,customer.first_name,customer.last_name,customer.billing_address"

  List response envelope: `{"list": [{"customer": {â€¦}}, â€¦], "next_offset": "â€¦"}`. Each item is
  wrapped in a resource-type key (`customer`, `subscription`, `invoice`, `transaction`). Use dotted
  --pick paths like `customer.email` to extract the nested field.

  Common paths (always use absolute URLs with your site):
    https://YOURSITE.chargebee.com/api/v2/customers               â€” all customers
    https://YOURSITE.chargebee.com/api/v2/customers/{id}          â€” one customer
    https://YOURSITE.chargebee.com/api/v2/subscriptions?customer_id[is]=CUST_ID  â€” by customer
    https://YOURSITE.chargebee.com/api/v2/invoices?customer_id[is]=CUST_ID
    https://YOURSITE.chargebee.com/api/v2/transactions?customer_id[is]=CUST_ID
    https://YOURSITE.chargebee.com/api/v2/events?source[is]=api&limit=100

  Useful pick paths:
    customer:      customer.id,customer.email,customer.first_name,customer.last_name,customer.billing_address
    subscription:  subscription.id,subscription.status,subscription.plan_id,subscription.next_billing_at,subscription.current_term_end
    invoice:       invoice.id,invoice.status,invoice.amount_due,invoice.date,invoice.due_date
    transaction:   transaction.id,transaction.amount,transaction.status,transaction.payment_method_type,transaction.date

  Estimate POSTs are allowlisted as non-mutating single-page calls:

      python -m lib.api post chargebee https://YOURSITE.chargebee.com/api/v2/estimates/create_subscription \
        --form subscription_items[item_price_id][0]=basic-USD \
        --form subscription_items[quantity][0]=1 \
        --pick estimate.invoice_estimate.total,estimate.invoice_estimate.currency_code
onboarding_md: |
  Ask which subscription-support cases customers write about (failed renewals, invoice questions,
  subscription state, refunds) and whether the Chargebee site is test or live. Explore
  representative customer, subscription, invoice, and transaction shapes without retaining rows;
  capture how a sender email maps to a customer and its subscriptions, stable plan/item-price IDs
  when reusable, and the status enums that matter (subscription active/non_renewing/cancelled,
  invoice paid/payment_due). A refund, cancellation, plan change, or credit is a write and must
  reference a live action or remain an explicit manual step.
