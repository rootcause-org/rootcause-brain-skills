families:
  - provider: notion
    need: Create/update Notion pages, database rows, page text
    connection: notion.write
    import: from lib.action import notion
    source_module: lib.action.notion
    manifest:
      - "Declare `connections: [notion.write]`."
      - "For database rows, use `database_id` plus plain `properties`; call `validate_database_values` before create/update."
      - "For row updates, include `record_id`; `update_database_row` verifies it belongs to `database_id` before writing."
      - "For page text, use `page_id`, `old_str`, `new_str`; validate that `old_str` is an exact unique editable-block match."
    common_params:
      - "`database_id`: Notion data-source ID, or a legacy database ID when it resolves to one data source."
      - "`properties`: JSON object of Notion column names to plain values; pass to `validate_database_values`, not raw Notion API JSON."
      - "`record_id`: existing Notion row/page ID for database-row updates."
      - "`page_id`: Notion page ID for text replacement or bookmark/link append."
      - "`old_str` / `new_str`: exact text anchor and replacement text; `old_str` must match exactly one editable block."
    useful_for:
      - create a Notion database row from plain column values
      - update an existing Notion database row after checking its parent data source
      - replace one exact editable text occurrence on a Notion page
      - append a bookmark/file link to a Notion page
    helpers:
      - name: retrieve_data_source
        signature: "retrieve_data_source(database_id: str) -> NotionDataSource"
        purpose: Resolve and return the live Notion data-source schema.
      - name: validate_database_values
        signature: "validate_database_values(database_id: str, values: Mapping[str, Any]) -> DatabaseValidation"
        purpose: Validate plain column values against the live data-source schema and convert them to Notion property payloads.
      - name: database_validation_summary
        signature: "database_validation_summary(checked: DatabaseValidation, *, operation: str) -> str"
        purpose: Build a reviewer-readable dry-run/preflight summary from validated row values.
      - name: create_database_row
        signature: "create_database_row(*, database_id: str, values: Mapping[str, Any]) -> NotionPage"
        purpose: Create one page row in a Notion data source.
      - name: update_database_row
        signature: "update_database_row(*, database_id: str, record_id: str, values: Mapping[str, Any]) -> NotionPage"
        purpose: Update one existing row after verifying it belongs to the requested data source.
      - name: validate_page_replacement
        signature: "validate_page_replacement(*, page_id: str, old_str: str, new_str: str) -> PageTextMatch"
        purpose: Confirm exactly one editable block contains the old text.
      - name: page_replacement_summary
        signature: "page_replacement_summary(match: PageTextMatch) -> str"
        purpose: Build a reviewer-readable dry-run/preflight summary for a page-text replacement.
      - name: replace_page_text
        signature: "replace_page_text(*, page_id: str, old_str: str, new_str: str) -> NotionBlock"
        purpose: Replace the first exact match in one editable block, preserving simple block shape.
      - name: create_page
        signature: "create_page(*, parent_id: str, title: str, properties: dict | None = None) -> NotionPage"
        purpose: Create a child page under a page parent.
      - name: update_properties
        signature: "update_properties(*, page_id: str, properties: dict) -> NotionPage"
        purpose: Patch native Notion page properties when the script intentionally builds the payload.
      - name: append_file_link
        signature: "append_file_link(*, page_id: str, title: str, url: str) -> NotionBlock"
        purpose: Append a bookmark block pointing at an externally hosted file.
      - name: find_page_text_matches
        signature: "find_page_text_matches(*, page_id: str, old_str: str) -> list[PageTextMatch]"
        purpose: Inspect editable blocks whose plain text contains an exact anchor before deciding whether replacement is safe.
    patterns:
      - title: Create a database row
        code: |
          from lib import action
          from lib.action import notion

          @action.main
          def run(p: action.Params) -> dict:
              checked = notion.validate_database_values(p["database_id"], p["properties"])
              if action.dry_run():
                  return {"summary": notion.database_validation_summary(checked, operation="Dry run: create row")}

              page = notion.create_database_row(database_id=p["database_id"], values=p["properties"])
              return {"summary": f"Created Notion row **{page.id}**.", "page_id": page.id, "url": page.url}
      - title: Update a database row
        code: |
          from lib import action
          from lib.action import notion

          @action.main
          def run(p: action.Params) -> dict:
              checked = notion.validate_database_values(p["database_id"], p["properties"])
              if action.dry_run():
                  return {"summary": notion.database_validation_summary(checked, operation="Dry run: update row")}

              page = notion.update_database_row(
                  database_id=p["database_id"],
                  record_id=p["record_id"],
                  values=p["properties"],
              )
              return {"summary": f"Updated Notion row **{page.id}**.", "page_id": page.id, "url": page.url}
      - title: Replace exact page text
        code: |
          from lib import action
          from lib.action import notion

          @action.main
          def run(p: action.Params) -> dict:
              match = notion.validate_page_replacement(page_id=p["page_id"], old_str=p["old_str"], new_str=p["new_str"])
              if action.dry_run():
                  return {"summary": notion.page_replacement_summary(match)}

              block = notion.replace_page_text(page_id=p["page_id"], old_str=p["old_str"], new_str=p["new_str"])
              return {"summary": f"Updated Notion block **{block.id}**.", "block_id": block.id}
    validation_failure:
      - "All helpers use `action.client(\"notion.write\")`; missing `connections: [notion.write]` or a missing project write grant fails before/at execution."
      - "Database helpers read the live data-source schema; unknown columns include available columns and close-name suggestions."
      - "Plain values are coerced by property type: title/rich_text strings, JSON numbers, select/status option names, multi_select arrays, booleans, email/url/date checks, relation page IDs, and people user IDs."
      - "Read-only/derived property types are rejected: formula, rollup, created_by, created_time, last_edited_by, last_edited_time, unique_id."
      - "Legacy database IDs resolve only when exactly one data source exists; multi-source databases fail with the available data-source IDs."
      - "Page text replacement fails unless `old_str` appears in exactly one editable rich-text block; no-match errors include nearby editable text hints."
      - "Dry-run patterns call the same validators the write path uses, so reviewer-facing failures match execution failures."
    do_not:
      - "Do not build raw Notion property payloads for database rows when plain values plus `validate_database_values` fit."
      - "Do not skip dry-run validation; use `database_validation_summary` or `page_replacement_summary` so reviewers see the same checks before execution."
      - "Do not guess Notion column names or select/status option labels; validate against the live schema first."
      - "Do not pass a generic database ID when Notion reports multiple data sources; ground the exact data-source ID."
      - "Do not pass `RC_CONN_*` tokens or raw Authorization headers; helpers use `RC_ACTION_*` via `notion.write`."
      - "Do not set formula, rollup, created/edited, unique_id, or other read-only columns."
      - "Do not use page text replacement for broad rewrites; `old_str` must be an exact unique anchor."
      - "Do not import underscored `lib.connectors.notion` internals. The generated action docs list only the supported `lib.action.notion` write helpers; read-only formatting helpers such as `compact_page` stay connector-side."
      - "Do not import sibling action files or provider SDKs; hosted scripts should use `lib` plus stdlib."

  - provider: googledrive
    need: Upload files or attachments to Google Drive
    connection: googledrive.write
    import: from lib.action import googledrive
    source_module: lib.action.googledrive
    manifest:
      - "Declare `connections: [googledrive.write]`."
      - "Use `type: attachment` params for user-provided files; pass the file param directly to `upload_attachment`."
    common_params:
      - "`folder_id`: destination Drive folder ID."
      - "`attachment`: hosted-action attachment param when uploading a user-provided file."
      - "`name`: optional override for the Drive filename."
    useful_for:
      - upload an email/dashboard attachment into a known Drive folder
      - upload a generated local file from the action workspace
      - return the Drive file ID and reviewer/shareable web URL
    helpers:
      - name: upload_file
        signature: "upload_file(*, folder_id: str, file: action.FileParam | Path | str, name: str | None = None, mime_type: str | None = None) -> DriveFile"
        purpose: Upload an action attachment or local file path to a Google Drive folder.
      - name: upload_attachment
        signature: "upload_attachment(*, folder_id: str, attachment: action.FileParam, name: str | None = None) -> DriveFile"
        purpose: Convenience wrapper for hosted-action attachment params.
    patterns:
      - title: Upload an action attachment
        code: |
          from lib import action
          from lib.action import googledrive

          @action.main
          def run(p: action.Params) -> dict:
              if action.dry_run():
                  return {"summary": f"Would upload **{p['attachment'].filename}** to Google Drive."}

              file = googledrive.upload_attachment(folder_id=p["folder_id"], attachment=p["attachment"])
              return {"summary": f"Uploaded **{file.name}** to Google Drive.", "file_id": file.id, "url": file.web_url}
      - title: Upload a generated file
        code: |
          from pathlib import Path
          from lib import action
          from lib.action import googledrive

          @action.main
          def run(p: action.Params) -> dict:
              path = Path("/tmp/report.txt")
              path.write_text("reviewed\n")
              if action.dry_run():
                  return {"summary": "Would upload `report.txt` to Google Drive."}

              file = googledrive.upload_file(folder_id=p["folder_id"], file=path, name="report.txt")
              return {"summary": f"Uploaded **{file.name}**.", "file_id": file.id, "url": file.web_url}
    validation_failure:
      - "Local paths are read from disk; missing files surface as normal file errors."
      - "Drive/API failures surface through `api.ApiError`/`action.ActionError` and become reviewer-visible action failures."
      - "The helper infers MIME type from the attachment or filename unless `mime_type` is provided."
    do_not:
      - "Do not call Drive upload endpoints manually; the helper handles multipart upload metadata and content."
      - "Do not use `RC_CONN_GOOGLEDRIVE`; hosted actions use the `googledrive.write` action connection."
      - "Do not assume a folder name is unique; pass a known `folder_id` discovered during grounding/preflight."

  - provider: mollie
    need: Create Mollie payment links or refunds after read-only Mollie grounding
    connection: mollie.write
    import: from lib.action import mollie
    source_module: lib.action.mollie
    manifest:
      - "Declare `connections: [mollie.write]`."
      - "Use a stable `idempotency_key` for every payment link or refund; derive it from the support case plus target payment/business object."
      - "Use string money values such as `10.00`, never floats; keep `currency` explicit."
      - "For refunds, include `payment_id`, `amount_value`, `currency`, `description`, and `idempotency_key`."
      - "For payment links, include `amount_value`, `currency`, `description`, and `idempotency_key`; add optional fields only when grounding says they apply."
    common_params:
      - "`payment_id`: Mollie payment ID (`tr_...`) for refunds."
      - "`amount_value` + `currency`: Mollie amount object fields, e.g. `20.00` + `EUR`."
      - "`description`: reviewer/customer-readable payment-link or refund reason."
      - "`idempotency_key`: deterministic retry key; required by both helpers."
      - "`profile_id` / `testmode`: only when the credential type and grounded Mollie evidence call for them."
    useful_for:
      - create a one-off Mollie payment link for an approved manual collection or invoice amount
      - refund part or all of an existing paid Mollie payment
      - execute a payment-link or refund draft that was first checked with the read-only Mollie plan commands
      - pass optional payment-link fields such as profile, redirect/webhook URLs, order lines, addresses, allowed methods, and test mode
    helpers:
      - name: create_payment_refund
        signature: "create_payment_refund(*, payment_id: str, amount_value: str, currency: str, description: str, idempotency_key: str, metadata: Any | None = None, testmode: bool | None = None) -> MollieRefund"
        purpose: Create a refund for an existing Mollie payment; returns `id`, `status`, and raw Mollie response.
      - name: create_payment_link
        signature: "create_payment_link(*, amount_value: str, currency: str, description: str, idempotency_key: str, profile_id: str = \"\", redirect_url: str = \"\", webhook_url: str = \"\", expires_at: str = \"\", reusable: bool = False, lines: list[dict[str, Any]] | None = None, billing_address: dict[str, Any] | None = None, shipping_address: dict[str, Any] | None = None, allowed_methods: list[str] | None = None, testmode: bool | None = None) -> MolliePaymentLink"
        purpose: Create a Mollie payment link; returns `id`, `payment_link` checkout URL when Mollie provides one, and raw Mollie response.
    patterns:
      - title: Refund a payment after read-only planning
        code: |
          from lib import action
          from lib.action import mollie

          @action.main
          def run(p: action.Params) -> dict:
              if action.dry_run():
                  return {"summary": f"Would refund **{p['currency']} {p['amount_value']}** on `{p['payment_id']}`."}

              refund = mollie.create_payment_refund(
                  payment_id=p["payment_id"],
                  amount_value=p["amount_value"],
                  currency=p["currency"],
                  description=p["description"],
                  idempotency_key=f"refund:{p['payment_id']}:{p['amount_value']}:{p['currency']}",
              )
              return {"summary": f"Created Mollie refund **{refund.id}** ({refund.status}).", "refund_id": refund.id, "status": refund.status}
      - title: Create a payment link
        code: |
          from lib import action
          from lib.action import mollie

          @action.main
          def run(p: action.Params) -> dict:
              if action.dry_run():
                  return {"summary": f"Would create a Mollie payment link for **{p['currency']} {p['amount_value']}**."}

              link = mollie.create_payment_link(
                  amount_value=p["amount_value"],
                  currency=p["currency"],
                  description=p["description"],
                  idempotency_key=f"payment-link:{p['reference']}",
                  profile_id=p.get("profile_id", ""),
                  expires_at=p.get("expires_at", ""),
              )
              return {"summary": f"Created Mollie payment link: {link.payment_link}", "payment_link_id": link.id, "payment_link": link.payment_link}
    validation_failure:
      - "Both helpers reject blank `idempotency_key`; `create_payment_link` also rejects blank `description`."
      - "For refunds, ground/preflight with `python -m lib.connectors.mollie refund-plan <payment_id> --amount <value> --currency <currency> --description <text>` before proposing."
      - "For payment links, ground/preflight with `python -m lib.connectors.mollie payment-link-plan --amount <value> --currency <currency> --description <text>` plus optional profile/testmode/order-line fields only when needed."
      - "Mollie validation/API failures surface through `api.ApiError`/`action.ActionError` as reviewer-visible action failures; do not send an optimistic draft after a failed execution."
    do_not:
      - "Do not document or call non-existent write helpers for payment status checks; use the read-only Mollie connector or `lib.api` GET for reads."
      - "Do not POST to Mollie directly from the standard run loop; writes belong in hosted actions with `connections: [mollie.write]`."
      - "Do not pass floats for amounts; Mollie amount values must be strings."
      - "Do not omit or randomize idempotency keys; retries and double-clicks must not create duplicate money movement."
      - "Do not send `profile_id` or `testmode` blindly; OAuth organization tokens may need them, profile-bound API keys usually should not."
